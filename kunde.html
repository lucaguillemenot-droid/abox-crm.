<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root{ --bg:#0a0e1a; --bg2:#111827; --bg3:#1a2332; --text:#f3f4f6; --muted:#9ca3af; --accent:#dc2626; --accent2:#b91c1c; --border:#1f2937; --borderL:#374151; --success:#10b981; --danger:#ef4444; }
html,body{ height:100%; }
body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.55; -webkit-font-smoothing:antialiased; }
.app{ max-width:620px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }

/* top bar */
.topbar{ position:sticky; top:0; z-index:50; display:flex; align-items:center; justify-content:space-between; padding:.9rem 1.1rem; padding-top:calc(.9rem + env(safe-area-inset-top)); background:rgba(10,14,26,.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
.tb-brand{ display:flex; align-items:center; gap:.55rem; font-weight:700; }
.tb-logo{ width:34px; height:34px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:9px; display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff; box-shadow:0 4px 12px rgba(220,38,38,.35); }
.tb-login{ background:var(--bg3); border:1px solid var(--borderL); color:var(--text); padding:.45rem .85rem; border-radius:9px; font-size:.82rem; font-weight:600; cursor:pointer; font-family:inherit; }
.tb-login:hover{ border-color:var(--accent); }

/* views */
.main{ flex:1; padding:1.1rem 1.1rem 6rem; }
.view{ display:none; animation:fade .25s ease; }
.view.active{ display:block; }
@keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

/* hero */
.hero{ border-radius:20px; padding:2rem 1.5rem; background:radial-gradient(ellipse at top left,#2a1416 0%,#141a28 70%); border:1px solid var(--borderL); margin-bottom:1.5rem; position:relative; overflow:hidden; }
.hero h1{ font-size:1.9rem; font-weight:800; letter-spacing:-.02em; line-height:1.15; margin-bottom:.5rem; }
.hero p{ color:var(--muted); margin-bottom:1.25rem; }
.hero .cta{ display:inline-flex; }
.btn{ display:inline-flex; align-items:center; justify-content:center; gap:.4rem; padding:.85rem 1.4rem; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; border:none; border-radius:11px; font-size:.95rem; font-weight:700; cursor:pointer; transition:.2s; box-shadow:0 6px 20px rgba(220,38,38,.3); font-family:inherit; }
.btn:hover{ transform:translateY(-1px); box-shadow:0 8px 26px rgba(220,38,38,.42); }
.btn:disabled{ opacity:.6; transform:none; cursor:default; }
.btn-block{ width:100%; }
.btn-ghost{ background:var(--bg3); border:1px solid var(--borderL); box-shadow:none; color:var(--text); }

.section-title{ font-size:1.15rem; font-weight:700; margin:1.5rem 0 .85rem; }
.card{ background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:1.1rem 1.15rem; margin-bottom:.85rem; }

/* facilities */
.facils{ display:grid; grid-template-columns:repeat(3,1fr); gap:.6rem; }
.facil{ background:var(--bg2); border:1px solid var(--border); border-radius:13px; padding:.95rem .5rem; text-align:center; }
.facil .ic{ font-size:1.5rem; }
.facil .nm{ font-size:.78rem; color:var(--muted); margin-top:.25rem; }

/* news */
.news-item .date{ font-size:.72rem; color:var(--accent); font-weight:700; letter-spacing:.4px; text-transform:uppercase; }
.news-item h3{ font-size:1.02rem; font-weight:700; margin:.2rem 0 .35rem; }
.news-item p{ color:var(--muted); font-size:.9rem; }
.empty{ color:var(--muted); font-size:.9rem; text-align:center; padding:1.5rem; }

/* signup form */
.form-group{ margin-bottom:1rem; }
label{ display:block; margin-bottom:.4rem; font-size:.82rem; font-weight:500; color:var(--muted); }
input,select{ width:100%; padding:.8rem .9rem; background:var(--bg3); border:1px solid var(--borderL); border-radius:10px; color:var(--text); font-size:.95rem; font-family:inherit; transition:.2s; }
input:focus,select:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(220,38,38,.15); }
.plans{ display:grid; gap:.55rem; margin-bottom:1rem; }
.plan{ background:var(--bg3); border:2px solid var(--borderL); border-radius:12px; padding:.85rem 1rem; cursor:pointer; display:flex; justify-content:space-between; align-items:center; transition:.15s; }
.plan:hover{ border-color:var(--accent); }
.plan.active{ border-color:var(--accent); background:rgba(220,38,38,.08); }
.plan .name{ font-weight:600; font-size:.95rem; }
.plan .desc{ font-size:.76rem; color:var(--muted); }
.plan .price{ font-weight:800; color:var(--accent); font-size:1rem; white-space:nowrap; }
.msg{ padding:.75rem; border-radius:10px; margin-bottom:1rem; font-size:.86rem; text-align:center; }
.msg.error{ background:rgba(239,68,68,.1); border:1px solid var(--danger); color:var(--danger); }
.success{ text-align:center; padding:1.5rem 0; }
.success .check{ width:70px; height:70px; border-radius:50%; background:rgba(16,185,129,.15); color:var(--success); display:flex; align-items:center; justify-content:center; font-size:2.1rem; margin:0 auto 1rem; }
.success h2{ font-size:1.35rem; margin-bottom:.4rem; }
.success p{ color:var(--muted); }

/* contact */
.kv{ display:flex; gap:.75rem; align-items:flex-start; padding:.7rem 0; border-bottom:1px solid var(--border); }
.kv:last-child{ border-bottom:none; }
.kv .ic{ font-size:1.15rem; width:28px; text-align:center; flex-shrink:0; }
.kv .lab{ font-size:.74rem; color:var(--muted); }
.kv .val{ font-weight:600; }
.kv a{ color:var(--text); text-decoration:none; }

/* bottom nav */
.nav{ position:fixed; bottom:0; left:0; right:0; z-index:50; display:flex; max-width:620px; margin:0 auto; background:rgba(17,24,39,.92); backdrop-filter:blur(12px); border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom); }
.nav-btn{ flex:1; background:none; border:none; color:var(--muted); padding:.7rem .25rem; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:.15rem; transition:.15s; }
.nav-btn .ic{ font-size:1.25rem; }
.nav-btn .lb{ font-size:.66rem; font-weight:600; }
.nav-btn.active{ color:var(--accent); }
.hidden{ display:none !important; }
</style>
